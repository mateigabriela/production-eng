server.port=8086
spring.application.name=prod-eng-service
mongodb.connection.url=${MONGODB_CONNECTION_URL:${MONGODB_CONECTION_URL:mongodb://localhost:27017}}
mongodb.database.name=${MONGODB_DATABASE_NAME:autoservice}

management.endpoint.prometheus.enabled=true
management.endpoints.web.exposure.include=info,health,prometheus

# Enable percentile histograms for HTTP server requests so Prometheus can
# query histogram buckets (http_server_requests_seconds_bucket)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.95
