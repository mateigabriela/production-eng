global:
  resolve_timeout: 1m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1m
  receiver: 'email'
  routes:
    - match:
        severity: critical
      receiver: 'critical-email'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning-email'
      repeat_interval: 30m
    - match:
        severity: info
      receiver: 'info-email'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['category']
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'info'
    equal: ['category']
  
receivers:
- name: 'email'
  email_configs:
  - to: 'mateigabriela202@gmail.com'
    from: 'mateigabriela202@gmail.com'
    smarthost: smtp.gmail.com:587
    auth_username: 'mateigabriela202@gmail.com'
    auth_identity: 'mateigabriela202@gmail.com'
    auth_password: 'aycm seqt qcqr zjoq'
    
- name: 'critical-email'
  email_configs:
  - to: 'mateigabriela202@gmail.com'
    from: 'alerts@prod-eng.local'
    smarthost: smtp.gmail.com:587
    auth_username: 'mateigabriela202@gmail.com'
    auth_identity: 'mateigabriela202@gmail.com'
    auth_password: 'aycm seqt qcqr zjoq'
    headers:
      Subject: '[🚨 CRITICAL] {{ .GroupLabels.alertname }}'
    html: |
      <h2>{{ .GroupLabels.alertname }}</h2>
      <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
      <p><strong>Category:</strong> {{ .GroupLabels.category }}</p>
      <ul>
      {{ range .Alerts }}
        <li>{{ .Annotations.summary }}</li>
