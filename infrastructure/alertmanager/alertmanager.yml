global:
  resolve_timeout: 1m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1m
  receiver: 'email'
  routes:
    - match:
        severity: critical
      receiver: 'critical-email'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning-email'
      repeat_interval: 30m
    - match:
        severity: info
      receiver: 'info-email'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['category']
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'info'
    equal: ['category']
  
receivers:
- name: 'email'
  email_configs:
  - to: 'mateigabriela202@gmail.com'
    from: 'john.doe@example.org'
    smarthost: app.debugmail.io:25
    auth_username: 'd74ae2d8-db53-4bef-bbd2-07ffad74addf'
    auth_identity: 'd74ae2d8-db53-4bef-bbd2-07ffad74addf'
    auth_password: '793b3c92-c3dd-4e41-a010-12c1a217f560'
    require_tls: false
    
- name: 'critical-email'
  email_configs:
  - to: 'mateigabriela202@gmail.com'
    from: 'john.doe@example.org'
    smarthost: app.debugmail.io:25
    auth_username: 'd74ae2d8-db53-4bef-bbd2-07ffad74addf'
    auth_identity: 'd74ae2d8-db53-4bef-bbd2-07ffad74addf'
    auth_password: '793b3c92-c3dd-4e41-a010-12c1a217f560'
    require_tls: false
    headers:
      Subject: '[🚨 CRITICAL] {{ .GroupLabels.alertname }}'
    html: |
      <h2>{{ .GroupLabels.alertname }}</h2>
      <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
      <p><strong>Category:</strong> {{ .GroupLabels.category }}</p>
      <ul>
      {{ range .Alerts }}
        <li>{{ .Annotations.summary }}</li>
        <li>Value: {{ .Annotations.description }}</li>
      {{ end }}
      </ul>

- name: 'warning-email'
  email_configs:
  - to: 'mateigabriela202@gmail.com'
    from: 'john.doe@example.org'
    smarthost: app.debugmail.io:25
    auth_username: 'd74ae2d8-db53-4bef-bbd2-07ffad74addf'
    auth_identity: 'd74ae2d8-db53-4bef-bbd2-07ffad74addf'
    auth_password: '793b3c92-c3dd-4e41-a010-12c1a217f560'
    require_tls: false
    headers:
      Subject: '[⚠️  WARNING] {{ .GroupLabels.alertname }}'
    html: |
