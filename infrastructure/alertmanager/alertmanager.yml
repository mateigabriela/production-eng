      <p><strong>Category:</strong> {{ .GroupLabels.category }}</p>
      <ul>
      {{ range .Alerts }}
        <li>{{ .Annotations.summary }}</li>
        <li>{{ .Annotations.description }}</li>
      {{ end }}
      </ul>

- name: 'info-email'
  email_configs:
  - to: 'mateigabriela202@gmail.com'
    from: 'john.doe@example.org'
    smarthost: app.debugmail.io:25
    auth_username: 'd74ae2d8-db53-4bef-bbd2-07ffad74addf'
