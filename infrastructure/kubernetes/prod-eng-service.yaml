apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    prod-eng-service: prod-eng
  name: prod-eng
spec:
  replicas: 1
  selector:
    matchLabels:
      prod-eng-service: prod-eng
  template:
    metadata:
      labels:
        prod-eng-service: prod-eng
    spec:
      containers:
        - env:
            - name: ENVIRONMENT_NAME
              value: local
            - name: MONGODB_CONECTION_URL
              value: mongodb://root:example@mongo:27017/
          image: octavian2508/prod-eng-img:lab7-8086
          imagePullPolicy: IfNotPresent
          name: prod-eng
          ports:
            - containerPort: 8086
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    prod-eng-service: prod-eng
  name: prod-eng
spec:
  type: LoadBalancer
  ports:
    - name: "8086"
      port: 8086
      targetPort: 8086
  selector:
    prod-eng-service: prod-eng
